openapi: 3.0.3
info:
  title: ConecTenis API
  version: 0.2.0
  description: |
    Laravel API at ~/projects/conec/conectenis (Sail, port 80).
    Auth, players, chat, places, and play-invitations are implemented on the backend.
servers:
  - url: http://localhost/api
paths:
  /auth/login:
    post:
      summary: Login
  /auth/user:
    get:
      summary: Current user
      security: [{ bearerAuth: [] }]
  /players/nearby:
    get:
      summary: Nearby players
      security: [{ bearerAuth: [] }]
  /players/{id}:
    get:
      summary: Player detail
      security: [{ bearerAuth: [] }]
  /places/nearby:
    get:
      summary: Nearby places
      security: [{ bearerAuth: [] }]
  /places:
    post:
      summary: Create place
      security: [{ bearerAuth: [] }]
  /places/{id}:
    get:
      summary: Place detail
      security: [{ bearerAuth: [] }]
    put:
      summary: Update place (creator only)
      security: [{ bearerAuth: [] }]
  /places/{id}/ratings:
    post:
      summary: Rate place (after completed match)
      security: [{ bearerAuth: [] }]
  /places/{id}/reports:
    post:
      summary: Report place
      security: [{ bearerAuth: [] }]
  /play-invitations:
    get:
      summary: List invitations (role=all|sent|received)
      security: [{ bearerAuth: [] }]
    post:
      summary: Create invitation
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}:
    get:
      summary: Invitation detail
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/accept:
    post:
      summary: Accept invitation
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/decline:
    post:
      summary: Decline invitation
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/cancel:
    post:
      summary: Cancel invitation
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/complete:
    post:
      summary: Mark match completed
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/rate-player:
    post:
      summary: Rate opponent
      security: [{ bearerAuth: [] }]
  /play-invitations/{id}/report-player:
    post:
      summary: Report player
      security: [{ bearerAuth: [] }]
  /conversations:
    get:
      summary: List conversations
      security: [{ bearerAuth: [] }]
  /messages:
    post:
      summary: Send message
      security: [{ bearerAuth: [] }]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
